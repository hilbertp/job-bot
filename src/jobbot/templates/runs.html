{% extends 'base.html' %}
{% block content %}
<div class="bg-white/10 rounded-2xl p-6 border border-white/20">
    <h2 class="text-2xl font-bold mb-6">Pipeline History</h2>

    <div class="overflow-x-auto">
        <table class="w-full text-left">
            <thead>
                <tr class="text-purple-200 border-b border-white/10">
                    <th class="pb-4">Run</th>
                    <th class="pb-4">Fetched</th>
                    <th class="pb-4">New</th>
                    <th class="pb-4">Tailored</th>
                    <th class="pb-4">Applied</th>
                    <th class="pb-4">Errors</th>
                </tr>
            </thead>
            <tbody id="runs-body"></tbody>
        </table>
    </div>
</div>

<script>
async function loadRuns() {
    const res = await fetch('/api/runs');
    const rows = await res.json();
    const tbody = document.getElementById('runs-body');
    tbody.innerHTML = '';
    if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="6" class="py-4">No runs yet.</td></tr>';
        return;
    }
    for (const run of rows) {
        const tr = document.createElement('tr');
        tr.className = 'border-b border-white/5';
        tr.innerHTML = `
            <td class="py-3"><a class="underline" href="/runs/${run.id}" title="${run.timestamp || ''}">#${run.id} · ${run.timestamp_display || run.timestamp || ''}</a></td>
            <td class="py-3">${run.n_fetched ?? 0}</td>
            <td class="py-3">${run.n_new ?? 0}</td>
            <td class="py-3">${run.n_generated ?? 0}</td>
            <td class="py-3">${run.n_applied ?? 0}</td>
            <td class="py-3">${run.n_errors ?? 0}</td>
        `;
        tbody.appendChild(tr);
    }
}

loadRuns();
</script>
{% endblock %}
