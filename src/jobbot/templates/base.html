<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobBot Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
    </style>
</head>
<body class="text-gray-100">
    <nav class="bg-white/10 backdrop-blur-md border-b border-white/20 p-4">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-2xl font-bold">JobBot</a>
            <div class="space-x-6">
                <a href="/" class="hover:text-purple-200">Dashboard</a>
                <a href="/jobs" class="hover:text-purple-200">Jobs</a>
                <a href="/runs" class="hover:text-purple-200">Runs</a>
            </div>
        </div>
    </nav>
    <main class="container mx-auto p-6">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
