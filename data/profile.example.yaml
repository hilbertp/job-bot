# Your structured profile. Used for matching and to fill application forms.
# Replace with your real data and save as data/profile.yaml.

personal:
  full_name: "Your Name"
  email: "you@example.com"
  phone: "+49 ..."          # or +1 / +44 / etc — country code that matches your location
  location:
    city: "Your City"
    country: "Your Country"
    timezone: "Europe/Berlin"   # IANA tz: e.g. America/New_York, Asia/Singapore, Europe/London
  links:
    linkedin: "https://www.linkedin.com/in/your-handle"
    github: "https://github.com/your-handle"
    website: "https://your-site.example"
    # youtube_english_sample: "https://www.youtube.com/watch?v=..."   # optional: link to a sample of you speaking English

# Used by both the scorer and the auto-applier's standard fields.
preferences:
  remote: true
  on_site_ok: false
  willing_to_relocate: false
  desired_salary_eur:
    min: 70000
    max: 95000
  notice_period_weeks: 8
  work_authorization: "EU citizen"
  languages: [de_native, en_fluent]

# Hard filters — any match here drops the job before scoring.
deal_breakers:
  industries: ["defense", "gambling"]
  keywords: ["unpaid", "commission only"]
  on_site_only: true   # if a job is on-site only and remote: true above, drop it

# Used by the matcher.
must_have_skills: []

nice_to_have_skills:
  - kubernetes
  - terraform
  - rust

# Default answers for common screener questions. The auto-applier looks here
# first; falls back to LLM only for questions not in this list.
screener_defaults:
  "Are you authorized to work in this country?": "Yes"
  "Do you require visa sponsorship?": "No"
  "Notice period?": "8 weeks"
  "Earliest start date?": "8 weeks from offer"
  "Years of Python experience?": "8"
