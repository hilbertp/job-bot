  email: "philipp@projuncta.com"
  phone: "+357 94101644"
  location:
    city: "Berlin"
    country: "Germany"
    timezone: "Europe/Berlin"
  links:
    linkedin: "https://www.linkedin.com/in/philipphilbert"
