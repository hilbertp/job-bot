preferences:
  remote: true
  on_site_ok: false          # open to hybrid if role is strong
  willing_to_relocate: false
  desired_salary_eur:
    min: 80000
    max: 110000
  notice_period_weeks: 4
  work_authorization: "EU citizen (German)"
  languages: [de_native, en_c2]
  target_roles:
    - Senior Product Manager
    - Senior Product Owner
    - Head of Product
    - Principal Product Manager

# Hard filters — job dropped before LLM scoring if any match
deal_breakers:
  industries: ["defense", "weapons", "gambling", "tobacco"]
  keywords: ["unpaid", "commission only", "junior", "entry level"]
  on_site_only: true   # dropped if remote is required and job is on-site only

# Required in job description to pass heuristic filter
must_have_skills: []

# Increases score but not required
nice_to_have_skills:
  - fintech
  - payments
  - regulated
  - data
  - platform
  - saas
  - b2b
  - agile
  - scrum
  - ai
  - machine learning
  - kubernetes
  - python
  - web3
  - crypto
  - defi
  - insurance
  - healthtech

# Default screener answers used by auto-applier before falling back to LLM
