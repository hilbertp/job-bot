# jobbot configuration. Copy to data/config.yaml and edit.

score_threshold: 0            # 0-100; minimum score to include in digest
max_jobs_per_run: 200         # safety cap on LLM spend
output_dir: output            # relative to repo root

# Path to a pre-designed static CV PDF used for outgoing applications.
# When this file exists, the generator skips per-job CV tailoring and attaches
# this PDF as-is. Cover letters stay tailored. Set to empty / null to restore
# Markdown→HTML→PDF per-job tailoring.
cv_pdf_path: "data/general CV.pdf"

digest:
  generate_docs_above_score: 70
  max_per_email: 100

# Per-source settings. Each can be enabled/disabled, given specific search queries,
# and (separately) opted into auto-submit.
sources:
  weworkremotely:
    enabled: true
    auto_submit: false
    queries:
      - category: remote-programming-jobs
      - category: remote-devops-sysadmin-jobs

  freelancermap:
    enabled: true
    auto_submit: false
    queries:
      - keywords: [python, data, ml]
        remote: true
      - keywords: [product, owner, agile, scrum]
        remote: true

  freelance_de:
    enabled: true
    auto_submit: false
    queries:
      - keywords: [python, backend]
      - keywords: [product, owner, agile, scrum]

  indeed:
    enabled: true
    auto_submit: false        # Indeed Apply is risky to automate; keep off
    queries:
      - q: "python developer"
        l: "Berlin"
      - q: "data engineer"
        l: "remote"
      - q: "product owner"
        l: "Berlin"
      - q: "product owner"
        l: "remote"

  stepstone:
    enabled: true
    auto_submit: false
    queries:
      - q: "python"
        l: "Deutschland"
      - q: "product owner"
        l: "Deutschland"

  xing:
    enabled: true
    auto_submit: false
    queries:
      - q: "python developer"
      - q: "product owner"

  linkedin:
    enabled: true
    auto_submit: false        # LinkedIn ToS — keep off; assist only
    queries:
      - keywords: "python developer"
        location: "Germany"
      - keywords: "product owner"
        location: "Germany"

# Auto-apply behavior (used only for sources where auto_submit: true)
apply:
  dry_run: true               # take screenshot of filled form, don't click submit
  confirm_each: false         # if true, pause and wait for human OK before submit
  per_run_limit: 5            # max submissions per scheduled run
  screener_min_confidence: 0.8  # below this, queue for manual review

# OTP fetcher
otp:
  poll_interval_s: 5
  timeout_s: 120

# Captcha solver
captcha:
  timeout_s: 90
  max_retries: 2
