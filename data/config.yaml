# jobbot configuration for Philipp Hilbert
score_threshold: 0            # 0-100; minimum score to include in digest
max_jobs_per_run: 200         # safety cap on LLM spend
output_dir: output            # relative to repo root

# Static outgoing CV PDF (skip per-job CV tailoring, keep cover letter tailored).
# Set to empty / null to restore Markdown→HTML→PDF per-job tailoring.
cv_pdf_path: "data/general CV.pdf"

digest:
  generate_docs_above_score: 70
  max_per_email: 100

sources:
  weworkremotely:
    enabled: true
    auto_submit: false
    # WWR is category-based (remote-only). Listings get scored by the
    # downstream LLM against the PO/PM profile, so off-target hits surface
    # as below_threshold rather than swamping the digest.
    queries:
      - category: remote-programming-jobs
      - category: remote-devops-sysadmin-jobs

  working_nomads:
    enabled: true
    auto_submit: false
    # Public JSON API returns the full exposed-jobs list (~30-100 entries) per
    # call. Empty q returns everything; LLM scorer filters off-target hits.
    queries:
      - q: ""

  nodesk:
    enabled: true
    auto_submit: false
    # Official RSS at /remote-jobs/index.xml; ~10-50 fresh entries per fetch.
    # Empty q returns the full feed.
    queries:
      - q: ""

  dailyremote:
    enabled: true
    auto_submit: false
    # ~198k-listing aggregator — MUST filter by query term, since each call
    # only returns ~20 results from the /remote-jobs?search= endpoint.
    queries:
      - q: "product manager"
      - q: "product owner"

  freelancermap:
    enabled: true
    auto_submit: false
    queries:
      - q: "product manager"
      - q: "product owner"

  freelance_de:
    # Disabled: freelance.de's robots.txt explicitly forbids automated crawling
    # without written permission, and listings are JS-rendered (no SSR HTML).
    # Re-enable only after obtaining permission from support@freelance.de.
    enabled: false
    auto_submit: false
    queries:
      - keywords: [product, management, python, data]
      - keywords: [product, owner, agile, scrum]

  indeed:
    enabled: false
    auto_submit: false        # Indeed Apply is risky to automate; keep off
    queries:
      - q: "product manager"
      - q: "product owner"

  stepstone:
    enabled: true
    auto_submit: false
    queries:
      - q: "product manager"
      - q: "product owner"

  xing:
    enabled: true
    auto_submit: false
    queries:
      - q: "product manager"
      - q: "product owner"

  linkedin:
    enabled: true
    auto_submit: false        # LinkedIn ToS — keep off; assist only
    queries:
      - keywords: "product manager"
      - keywords: "product owner"

apply:
  dry_run: true               # take screenshot of filled form, don't click submit
  confirm_each: false         # if true, pause and wait for human OK before submit
  per_run_limit: 5            # max submissions per scheduled run
  screener_min_confidence: 0.8  # below this, queue for manual review

otp:
  poll_interval_s: 5
  timeout_s: 120

captcha:
  timeout_s: 90
  max_retries: 2
